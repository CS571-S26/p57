<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bus Tracker — Redirecting</title>
    <script>
      // Redirect all 404s to index.html so the SPA router can handle them.
      // With HashRouter this is rarely needed, but it's a safe fallback.
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/p57/' + '#' + path.replace('/p57', '')
      );
    </script>
  </head>
  <body></body>
</html>
